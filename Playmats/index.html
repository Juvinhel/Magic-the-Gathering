<html><head><style> body { font-family: Arial, sans-serif; margin: 0; } .header { display: grid; grid-template-columns: 1fr; grid-template-rows: 1fr; padding: 0.5em; } .header > * { grid-column: 1/ -1; grid-row: 1 / -1; } .title { text-align: center; padding: 0; margin: 0; } .view-select { height: max-content; justify-self: end; align-self: center; width: 6em; font-size: 1.25em; } .group { font-size: 1.25em; padding: 0.5em; gap: 0.5em; } .group span { overflow: hidden; width: 100%; white-space: nowrap; text-overflow: ellipsis; } .list { display: grid; grid-template-columns: max-content 1fr min-content min-content; grid-auto-rows: max-content; } .list .preview { display: none; } .list .size { text-align: right; } .list > * { grid-column: 1 / -1; display: grid; grid-template-columns: subgrid; gap: 0.5em; align-items: center; text-decoration: none; border-bottom: solid 1px; } .tiles { display: grid; grid-template-columns: repeat(auto-fill, 6.5em); } .tiles i { display: none; } .tiles span { text-align: center; } .tiles .date, .tiles .size { display: none; } .tiles > * { display: grid; grid-template-columns: 6em; grid-template-rows: max-content 6em; text-decoration: none; background: #d9d9d9; border-radius: 0.25em; padding: 0.25em; } .preview { object-fit: cover; width: 100%; height: 100%; object-position: top center; font-size: 3.5em; color: black; } </style><title>Playmats</title><script src="https://rawcdn.githack.com/nextapps-de/spotlight/0.7.8/dist/spotlight.bundle.js"></script></head><body><div class="header"><h1 class="title">Playmats</h1><select class="view-select" onchange="changeView(this.value)"><option value="list" selected>List</option><option value="tiles">Tiles</option></select></div><div class="group list spotlight-group" data-infinite="true"><a class="folder directory up" href=".." title="up"><i>🗁</i><span>..</span><span class="preview">🗀</span></a><a class="file spotlight" href="Sparkle.png" title="Sparkle"><i>🗋</i><span class="name">Sparkle.png</span><span class="date">2026-07-01 11:37</span><span class="size">5,0 MiB</span><img class="preview" src="Sparkle.png" alt="Sparkle" loading="lazy" /></a><a class="file spotlight" href="tribal.png" title="tribal"><i>🗋</i><span class="name">tribal.png</span><span class="date">2026-07-01 11:37</span><span class="size">2,0 MiB</span><img class="preview" src="tribal.png" alt="tribal" loading="lazy" /></a></div><script> function changeView(view) { const group = document.querySelector(".group"); switch(view) { case "list": group.classList.remove("tiles"); group.classList.add("list"); break; case "tiles": group.classList.remove("list"); group.classList.add("tiles"); break; } } </script></body></html>
